# XcodeGen project spec for TreasuryiPad.
# Generate the .xcodeproj with:   xcodegen generate
# Or:                              brew install xcodegen && xcodegen generate
name: TreasuryiPad
options:
  bundleIdPrefix: dev.treasurykernel
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"            # iPad only
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
    GENERATE_INFOPLIST_FILE: "NO"
    CODE_SIGN_STYLE: Automatic

packages:
  TreasuryKernel:
    path: ".."                              # repo root contains Package.swift

targets:
  TreasuryiPad:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: Resources/Assets.xcassets
    dependencies:
      - package: TreasuryKernel
        product: TreasuryKernel
      - package: TreasuryKernel
        product: TreasuryTrading
      - package: TreasuryKernel
        product: TreasuryUI
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_NAME: TreasuryiPad
        PRODUCT_BUNDLE_IDENTIFIER: dev.treasurykernel.ipad
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
